<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión</title>
</head>
<body>
    <div class="login-container">
        <h2>Bienvenido a la Biblioteca de Bavel</h2>
        
        <label for="nombre">Nombre de Usuario:</label>
        <input type="text" id="nombre" placeholder="Ej. Carlos Perez">
        
        <label for="password">Contraseña:</label>
        <input type="password" id="password" placeholder="Tu contraseña">
        
        <button onclick="iniciarSesion()">Entrar</button>
        <p id="mensaje-error" style="color: red; display: none;">Credenciales incorrectas.</p>
    </div>

    <script src="Javascript/index_js.js"></script>
</body>
</html>
